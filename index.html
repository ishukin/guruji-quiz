        { q: "IPL mein 'Thala' kise kehte hain?", o: ["Virat", "Rohit", "Dhoni", "Hardik"], c: 2 },
        { q: "Computer ka brain kise kehte hain?", o: ["RAM", "Mouse", "CPU", "Keyboard"], c: 2 },
        { q: "Bharat ka National Bird kaunsa hai?", o: ["Peacock", "Parrot", "Eagle", "Crow"], c: 0 },
        { q: "Bharat ki rajdhani kya hai?", o: ["Mumbai", "Delhi", "Jaipur", "Kolkata"], c: 1 }
    ];

    let db, userId, userCoins = 0, streak = 0, canAnswer = true;
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function init() {
        if (typeof firebase === 'undefined') { setTimeout(init, 100); return; }
        const config = {
            apiKey: "AIzaSyBpRSm6R2q3MluRWU_5MTVh7unovkVcOgk",
            authDomain: "famous-palisade-437405-m5.firebaseapp.com",
            databaseURL: "https://famous-palisade-437405-m5-default-rtdb.firebaseio.com",
            projectId: "famous-palisade-437405-m5",
            storageBucket: "famous-palisade-437405-m5.firebasestorage.app",

        firebase.initializeApp(config);
        db = firebase.database();
        userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "guest_"+Math.floor(Math.random()*9999);

                userCoins = (snap.val() && snap.val().coins) || 0;
                document.getElementById('coin-txt').innerText = userCoins;
                document.getElementById('loader').style.display = 'none';
                if(!streak) nextQ();
            });
        }).catch(() => {
            document.getElementById('loader').innerHTML = "Firebase Connection Error!";
        });
    }

    function nextQ() {
        canAnswer = true;
        let q = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('question').innerText = q.q;
        let box = document.getElementById('options-box');
        box.innerHTML = '';

            btn.className = 'opt-btn';
            btn.innerText = opt;

            box.appendChild(btn);
        });
    }

    function checkAns(p, c, btn) {
        if(!canAnswer) return;
        canAnswer = false;
        if(p === c) {
            btn.classList.add('correct');
            streak++;
            document.getElementById('streak-txt').innerText = streak;

        } else {
            btn.classList.add('wrong');
            tg.HapticFeedback.notificationOccurred('error');
            setTimeout(() => {
                tg.showConfirm("Galat Jawab! Ad dekh kar Lifeline lein?", ok => {
                    if(ok) showMonetagAd(true); else resetGame();
                });
            }, 600);
        }

    function showMonetagAd(isLifeline = false) {
        if(typeof show_10985812 === 'function') {

                if(!isLifeline) {
                    db.ref('users/'+userId).update({ coins: userCoins + 50 });
                    tg.showAlert("50 Coins added!");
                }
                resetGame();
            }).catch(() => resetGame());
        } else {
            tg.showAlert("Ad server busy!");
            resetGame();
        }
    }

    function handleAdsterra(type) {
        const bonus = type === 'daily' ? 20 : 10;
        const link = type === 'daily' ? AD_LINK_1 : AD_LINK_2;
        
        tg.showConfirm(`${bonus} Coins ke liye ad visit karein?`, ok => {
            if(ok) {
                tg.openLink(link);
                // Security Delay
                setTimeout(() => {
                    db.ref('users/'+userId).update({ coins: userCoins + bonus });
                    tg.showAlert(`${bonus} Coins added successfully!`);
                }, 4000);
            }
        });
    }

    function resetGame() { streak = 0; document.getElementById('streak-txt').innerText = 0; nextQ(); }
    function openWithdraw() { document.getElementById('withdraw-page').style.display = 'block'; }
    function closeWithdraw() { document.getElementById('withdraw-page').style.display = 'none'; }
    
    function submitWithdraw() {
        let upi = document.getElementById('upi-input').value;
        if(userCoins < 2000) return tg.showAlert("Min 2000 Coins required!");
        if(!upi.includes('@')) return tg.showAlert("Valid UPI ID please!");
        db.ref('withdrawals').push({ 
            uid:userId, 
            upi:upi, 
            amount:userCoins, 
            status:'pending', 
            date: new Date().toLocaleString() 
        }).then(() => {
            db.ref('users/'+userId).update({ coins: 0 });
            tg.showAlert("Request Sent! 24h Payout.");
            closeWithdraw();
        });
    }

    // Security: Anti-Inspect
    document.addEventListener('contextmenu', e => e.preventDefault());
    init();
