<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Guruji Quiz Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://alwingulla.com/sdk.js" data-zone="10985812" data-sdk="show_10985812"></script>

    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #f0f2f5);
            --card: var(--tg-theme-secondary-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222);
            --hint: var(--tg-theme-hint-color, #888);
            --accent: #0088cc;
            --success: #2ecc71;
            --error: #e74c3c;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; overflow: hidden; user-select: none; }
        
        .top-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .stat-item { background: var(--card); flex: 1; padding: 12px 5px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: bold; font-size: 13px; border: 1px solid rgba(0,0,0,0.02); }
        
        .game-card { background: var(--card); padding: 25px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); min-height: 300px; display: flex; flex-direction: column; justify-content: center; border: 1px solid rgba(0,0,0,0.02); }
        #question { font-size: 20px; font-weight: 700; margin-bottom: 25px; line-height: 1.3; }
        
        .opt-btn { background: var(--bg); border: 1px solid rgba(0,0,0,0.08); padding: 15px; border-radius: 12px; margin-bottom: 10px; font-size: 16px; font-weight: 500; cursor: pointer; width: 100%; text-align: left; color: var(--text); outline: none; }
        
        .bonus-group { display: flex; gap: 10px; margin-top: 20px; }
        .bonus-btn { flex: 1; border: none; padding: 12px; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; font-size: 13px; }
        .daily { background: linear-gradient(135deg, #f1c40f, #f39c12); }
        .watch { background: linear-gradient(135deg, #3498db, #2980b9); }

        #withdraw-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; padding: 20px; box-sizing: border-box; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; box-sizing: border-box; background: var(--card); color: var(--text); }
        
        .main-action { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-left-color: var(--accent); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="font-size:12px; color:var(--hint); margin-top:10px;">Connecting to Guru...</p></div>

<div class="top-bar">
    <div class="stat-item">💰 <span id="coin-txt">0</span></div>
    <div class="stat-item">🏆 Streak: <span id="streak-txt">0</span>/3</div>
    <div class="stat-item" style="background:var(--success); color:white;" onclick="openWithdraw()">Withdraw</div>
</div>

<div class="game-card">
    <div id="question">Quiz loading...</div>
    <div id="options-box"></div>
    
    <div class="bonus-group">
        <button class="bonus-btn daily" onclick="handleAdsterra('daily')">🎁 Daily Bonus</button>
        <button class="bonus-btn watch" onclick="handleAdsterra('watch')">📺 Watch & Earn</button>
    </div>
</div>

<div id="withdraw-page">
    <div style="background:var(--card); padding:25px; border-radius:20px;">
        <h2 style="margin-top:0">Redeem</h2>
        <input type="text" id="upi-input" placeholder="example@upi">
        <button class="main-action" onclick="submitWithdraw()">Request Payout</button>
        <button class="main-action" style="background:#888; margin-top:10px;" onclick="closeWithdraw()">Back</button>
    </div>
</div>

<script>
    const AD_LINK_1 = "https://www.profitablecpmratenetwork.com/sw6x4kb1?key=8392426d1693ebf376ed4c76676e45a8";
    const AD_LINK_2 = "https://www.profitablecpmratenetwork.com/jumf2981d?key=d69c896e4affe38b0f290f5a8d56b3ff";

    const questions = [
        { q: "Rajasthan ka state animal kaunsa hai?", o: ["Camel", "Tiger", "Lion", "Elephant"], c: 0 },
        { q: "IPL 2024 mein sabse mehnga player?", o: ["Starc", "Cummins", "Virat", "Rohit"], c: 0 },
        { q: "Computer ka brain kise kehte hain?", o: ["RAM", "Mouse", "CPU", "Keyboard"], c: 2 },
        { q: "Bharat ki rajdhani kya hai?", o: ["Mumbai", "Delhi", "Jaipur", "Kolkata"], c: 1 }
    ];

    let db, userId, userCoins = 0, streak = 0;
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function init() {
        const config = {
            apiKey: "AIzaSyBpRSm6R2q3MluRWU_5MTVh7unovkVcOgk",
            authDomain: "famous-palisade-437405-m5.firebaseapp.com",
            databaseURL: "https://famous-palisade-437405-m5-default-rtdb.firebaseio.com",
            projectId: "famous-palisade-437405-m5",
            storageBucket: "famous-palisade-437405-m5.firebasestorage.app",
            messagingSenderId: "686867296734",
            appId: "1:686867296734:web:ee2515d37e0e0e22f16d4f"
        };
        
        firebase.initializeApp(config);
        db = firebase.database();
        userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "guest_"+Math.floor(Math.random()*999);

        firebase.auth().signInAnonymously().then(() => {
            db.ref('users/' + userId).on('value', snap => {
                userCoins = (snap.val() && snap.val().coins) || 0;
                document.getElementById('coin-txt').innerText = userCoins;
                hideLoader();
            });
        }).catch(e => {
            console.log(e);
            hideLoader();
        });
    }

    function hideLoader() {
        document.getElementById('loader').style.display = 'none';
        if(document.getElementById('options-box').innerHTML === "") nextQ();
    }

    function nextQ() {
        let q = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('question').innerText = q.q;
        let box = document.getElementById('options-box');
        box.innerHTML = '';
        q.o.forEach((opt, i) => {
            let btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if(i === q.c) {
                    streak++;
                    document.getElementById('streak-txt').innerText = streak;
                    if(streak >= 3) {
                        tg.showConfirm("3 Sahi! Ad dekh kar 50 coins lein?", ok => { if(ok) showMonetag(); else reset(); });
                    } else { tg.showAlert("Sahi!"); nextQ(); }
                } else { tg.showAlert("Galat!"); reset(); }
            };
            box.appendChild(btn);
        });
    }

    function showMonetag() {
        if(typeof show_10985812 === 'function') {
            show_10985812().then(() => {
                db.ref('users/'+userId).update({ coins: userCoins + 50 });
                reset();
            }).catch(() => reset());
        } else reset();
    }

    function handleAdsterra(type) {
        let link = type === 'daily' ? AD_LINK_1 : AD_LINK_2;
        let bonus = type === 'daily' ? 20 : 10;
        tg.showConfirm("Ad dekh kar coins lein?", ok => {
            if(ok) {
                tg.openLink(link);
                setTimeout(() => {
                    db.ref('users/'+userId).update({ coins: userCoins + bonus });
                    tg.showAlert("Coins added!");
                }, 4000);
            }
        });
    }

    function reset() { streak = 0; document.getElementById('streak-txt').innerText = 0; nextQ(); }
    function openWithdraw() { document.getElementById('withdraw-page').style.display = 'block'; }
    function closeWithdraw() { document.getElementById('withdraw-page').style.display = 'none'; }
    function submitWithdraw() {
        let upi = document.getElementById('upi-input').value;
        if(userCoins < 2000) return tg.showAlert("Min 2000 Coins!");
        db.ref('withdrawals').push({ uid:userId, upi:upi, amount:userCoins, status:'pending' }).then(() => {
            db.ref('users/'+userId).update({ coins: 0 });
            tg.showAlert("Sent!"); closeWithdraw();
        });
    }

    // Force hide loader after 6 seconds if stuck
    setTimeout(hideLoader, 6000);
    init();
</script>
</body>
</html>
