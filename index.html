<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Guruji Quiz Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #0088cc; --success: #2ecc71; --error: #e74c3c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; overflow: hidden; user-select: none; }
        .top-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        .stat-item { background: var(--card); flex: 1; padding: 12px 5px; border-radius: 12px; font-weight: bold; font-size: 13px; border: 1px solid #333; }
        .game-card { background: var(--card); padding: 25px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-height: 320px; display: flex; flex-direction: column; justify-content: center; }
        #question { font-size: 20px; font-weight: 700; margin-bottom: 25px; line-height: 1.4; }
        .opt-btn { background: #2a2a2a; border: 1px solid #444; padding: 15px; border-radius: 12px; margin-bottom: 10px; font-size: 16px; font-weight: 500; cursor: pointer; width: 100%; text-align: left; color: #fff; outline: none; }
        .correct { background: var(--success) !important; border-color: #27ae60 !important; }
        .wrong { background: var(--error) !important; border-color: #c0392b !important; }
        .bonus-group { display: flex; gap: 10px; margin-top: 20px; }
        .bonus-btn { flex: 1; border: none; padding: 12px; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; font-size: 13px; }
        #withdraw-page, #reward-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .action-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; margin-bottom: 12px; cursor: pointer; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 3px solid #333; border-left-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="margin-top:10px; font-size:12px;">Syncing with Guru...</p></div>

<div class="top-bar">
    <div class="stat-item">💰 <span id="coin-txt">0</span></div>
    <div class="stat-item">🏆 Streak: <span id="streak-txt">0</span>/3</div>
    <div class="stat-item" style="background:var(--success); cursor:pointer;" onclick="openPage('withdraw-page')">Withdraw</div>
</div>

<div class="game-card">
    <div id="question">Loading Questions...</div>
    <div id="options-box"></div>
    <div class="bonus-group">
        <button class="bonus-btn" style="background:#f39c12" onclick="handleAd('daily')">🎁 Bonus</button>
        <button class="bonus-btn" style="background:#3498db" onclick="handleAd('watch')">📺 Watch</button>
    </div>
</div>

<div id="reward-overlay">
    <div style="background:var(--card); padding:30px; border-radius:20px; margin-top:50px;">
        <h2>Congratulations! 🏆</h2>
        <p style="font-size:14px; color:#aaa;">Choose your reward carefully:</p>
        <button class="action-btn" style="background:#2ecc71" onclick="handleAd('reward_normal')">💰 50 Coins</button>
        <button class="action-btn" style="background:#f1c40f; color:#000" onclick="handleAd('reward_extra')">🔥 80 Coins (High Ad)</button>
        <button class="action-btn" style="background:#444" onclick="resetGame(); closePage('reward-overlay')">Back to Game</button>
    </div>
</div>

<div id="withdraw-page">
    <div style="background:var(--card); padding:20px; border-radius:20px;">
        <h2>Withdraw Coins</h2>
        <input type="text" id="upi-input" placeholder="Enter UPI (e.g. name@upi)" style="width:100%; padding:15px; margin-bottom:15px; border-radius:10px; background:#121212; color:#fff; border:1px solid #333;">
        <button class="action-btn" onclick="submitWithdraw()">Submit Request</button>
        <button class="action-btn" style="background:#444" onclick="closePage('withdraw-page')">Back</button>
    </div>
</div>

<script>
    const LINK_1 = "https://www.profitablecpmratenetwork.com/sw6x4kb1?key=8392426d1693ebf376ed4c76676e45a8";
    const LINK_2 = "https://www.profitablecpmratenetwork.com/jumf2981d?key=d69c896e4affe38b0f290f5a8d56b3ff";
    const LINK_3 = "https://www.profitablecpmratenetwork.com/r3pksuu0m?key=c22fa2c5393948a2a3af9f97965c820d";

    let db, userId, userCoins = 0, streak = 0, canAnswer = true, questions = [], currentQ;
    const tg = window.Telegram.WebApp;
    tg.expand();

    function init() {
        const config = {
            apiKey: "AIzaSyBpRSm6R2q3MluRWU_5MTVh7unovkVcOgk",
            databaseURL: "https://famous-palisade-437405-m5-default-rtdb.firebaseio.com",
            projectId: "famous-palisade-437405-m5"
        };
        firebase.initializeApp(config);
        db = firebase.database();
        userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "user_" + Math.floor(Math.random()*9999);

        db.ref('quiz_questions').on('value', snap => {
            questions = [];
            snap.forEach(child => { questions.push(child.val()); });
            document.getElementById('loader').style.display = 'none';
            if(questions.length > 0) loadQuiz();
        });

        db.ref('users/' + userId).on('value', snap => {
            userCoins = (snap.val() && snap.val().coins) || 0;
            document.getElementById('coin-txt').innerText = userCoins;
        });
    }

    function loadQuiz(isRetry = false) {
        if(questions.length === 0) return;
        canAnswer = true;
        if(!isRetry) currentQ = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('question').innerText = currentQ.q;
        let box = document.getElementById('options-box');
        box.innerHTML = '';
        currentQ.o.forEach((opt, i) => {
            let btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAns(i, currentQ.c, btn);
            box.appendChild(btn);
        });
    }

    function checkAns(picked, correct, btn) {
        if(!canAnswer) return;
        canAnswer = false;
        if(picked === correct) {
            btn.classList.add('correct');
            streak++;
            document.getElementById('streak-txt').innerText = streak;
            tg.HapticFeedback.notificationOccurred('success');
            setTimeout(() => {
                if(streak >= 3) openPage('reward-overlay');
                else loadQuiz();
            }, 800);
        } else {
            btn.classList.add('wrong');
            tg.HapticFeedback.notificationOccurred('error');
            setTimeout(() => {
                tg.showConfirm("Wrong! Watch Ad for 15s to retry same question?", ok => {
                    if(ok) handleAd('retry');
                    else { streak = 0; document.getElementById('streak-txt').innerText = 0; loadQuiz(); }
                });
            }, 500);
        }
    }

    function handleAd(type) {
        let link = LINK_1, bonus = 0;
        if(type === 'reward_normal') { link = LINK_2; bonus = 50; }
        if(type === 'reward_extra' || type === 'retry') { link = LINK_3; bonus = (type === 'retry' ? 0 : 80); }
        if(type === 'daily') bonus = 20;
        if(type === 'watch') bonus = 10;
        
        tg.openLink(link);
        
        // Anti-Cheat Timer Start
        tg.showAlert("⚠️ Wait 15 seconds on the ad page to verify and get your coins!");

        setTimeout(() => {
            tg.showConfirm("Kya aapne 15 second tak ad dekha?", confirmed => {
                if(confirmed) {
                    if(bonus > 0) {
                        db.ref('users/'+userId).update({ coins: userCoins + bonus });
                        tg.showAlert("✅ Success! " + bonus + " Coins added.");
                    }
                    if(type === 'retry') loadQuiz(true);
                    if(type.includes('reward')) { closePage('reward-overlay'); resetGame(); }
                } else {
                    tg.showAlert("❌ Coins not added! You must watch the ad.");
                    if(type.includes('reward')) { closePage('reward-overlay'); resetGame(); }
                }
            });
        }, 15000); // 15 Seconds Delay
    }

    function resetGame() { streak = 0; document.getElementById('streak-txt').innerText = 0; loadQuiz(); }
    function openPage(id) { document.getElementById(id).style.display = 'block'; }
    function closePage(id) { document.getElementById(id).style.display = 'none'; }

    function submitWithdraw() {
        let upi = document.getElementById('upi-input').value;
        if(userCoins < 2000 || !upi.includes('@')) return tg.showAlert("Min 2000 coins & Valid UPI!");
        db.ref('withdrawals').push({ uid:userId, upi:upi, amount:userCoins, date: new Date().toLocaleString() });
        db.ref('users/'+userId).update({ coins: 0 });
        tg.showAlert("Withdrawal Request Sent! Payout within 24h.");
        closePage('withdraw-page');
    }

    init();
</script>
</body>
</html>
